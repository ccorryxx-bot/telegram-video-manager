name: Process Video V4 (Jav V3)
on:
  repository_dispatch:
    types: [jav_process]
jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsm6 libxext6
          pip install yt-dlp==2026.6.9 opencv-python==4.13.0.92 telethon==1.44.0 requests==2.34.2 brotli curl_cffi
      - name: Run processor
        env:
          API_ID: ${{ secrets.TG_API_ID }}
          API_HASH: ${{ secrets.TG_API_HASH }}
          BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TARGET_CHANNEL_ID: ${{ github.event.client_payload.target_channel_id }}
          VIDEO_URL: ${{ github.event.client_payload.video_url }}
          PHOTO_CAPTION: ${{ github.event.client_payload.photo_caption }}
          VIDEO_CAPTION: ${{ github.event.client_payload.video_caption }}
          NUM_PHOTOS: ${{ github.event.client_payload.num_photos }}
          POST_MODE: ${{ github.event.client_payload.post_mode }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
          WORKER_URL: ${{ github.event.client_payload.worker_url }}
          WORKFLOW_NAME: ${{ github.workflow }}
          PH_USERNAME: ${{ secrets.PH_USERNAME }}
          PH_PASSWORD: ${{ secrets.PH_PASSWORD }}
          PH_COOKIES_B64: ${{ secrets.PH_COOKIES_B64 }}
        run: python process_video.py
